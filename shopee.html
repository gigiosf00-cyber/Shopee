    <style>
        :root { --primary: #ee4d2d; --bg: #f5f5f5; --text: #333; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:var(--text); padding:10px; }
        
        /* Cabeçalho e Busca */
        .header { text-align:center; padding:15px 0; }
        .header h1 { font-size:22px; font-weight:800; }
        .header span { color:var(--primary); }
        
        .search-wrap { 
            position: sticky; top: 0; background: var(--bg); 
            z-index: 100; padding: 10px 0; margin-bottom: 15px;
        }
        .search-bar { display:flex; gap:8px; margin-bottom:8px; }
        .search-bar input { 
            flex:1; padding:12px; border-radius:10px; border:2px solid #ddd; 
            font-size:16px; font-weight:700; outline:none; text-transform:uppercase; 
        }
        .btn-buscar { background:var(--primary); color:#fff; border:none; padding:12px 20px; border-radius:10px; font-weight:800; }
        
        .btn-colar { 
            width:100%; padding:10px; border-radius:10px; background:#fff; 
            border:2px dashed #ee4d2d; color:#ee4d2d; font-weight:700; 
            font-size:14px; display:flex; align-items:center; justify-content:center; gap:8px; 
        }

        .btn-limpar { 
            display:none; width:100%; margin-top:8px; padding:12px; border-radius:10px; 
            background:#333; color:#fff; font-weight:700; border:none;
        }

        /* Grid de Produtos */
        .grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }
        .card { background:#fff; border-radius:12px; overflow:hidden; border:1px solid #eee; display: flex; flex-direction: column; }
        .card img { width:100%; aspect-ratio: 1/1; object-fit:cover; background:#f9f9f9; }
        .card-content { padding:8px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-ref { font-size:10px; font-weight:800; color:var(--primary); margin-bottom:2px; }
        .title { font-size:11px; font-weight:700; margin-bottom:8px; line-height:1.2; height:26px; overflow:hidden; text-transform: capitalize; }
        
        /* Botões do Card */
        .actions { display:flex; flex-direction: column; gap:5px; margin-top: auto; }
        .btn-card { text-align:center; padding:8px 2px; border-radius:6px; text-decoration:none; font-weight:700; font-size:10px; }
        .btn-buy { background:var(--primary); color:#fff; }
        .btn-video { background:#f1f1f1; color:#555; }
        
        #msgErro { display:none; color:red; font-size:13px; text-align:center; margin-top:10px; font-weight:700; }
    </style>
</head>
