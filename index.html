<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBMARKETG67 | Vitrines de Afiliado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-weight: 800; font-size: 24px; margin-bottom: 10px; }
        h1 span { color: #ee4d2d; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .links-grid { display: flex; flex-direction: column; gap: 15px; }
        .btn { text-decoration: none; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; transition: 0.3s; color: white; border: none; font-size: 16px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); opacity: 0.9; }
        
        /* Cores das Marcas */
        .shopee { background-color: #ee4d2d; }
        .amazon { background-color: #232f3e; }
        .mercado-livre { background-color: #fff159; color: #333; }
        
        i { font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>WEBMARKET<span>G67</span></h1>
    <p>Escolha uma de nossas vitrines oficiais:</p>

    <div class="links-grid">
        <!-- BOTÃO SHOPEE -->
        <a href="shopee.html" class="btn shopee">
            <i class="fas fa-shopping-bag"></i> VITRINE SHOPEE
        </a>

        <!-- BOTÃO AMAZON -->
        <a href="amazon.html" class="btn amazon">
            <i class="fab fa-amazon"></i> VITRINE AMAZON
        </a>

        <!-- BOTÃO MERCADO LIVRE -->
        <a href="mercadolivre.html" class="btn mercado-livre">
            <i class="fas fa-handshake"></i> MERCADO LIVRE
        </a>
    </div>
</div>

</body>
</html>
